services:
  - type: web
    name: acity-rag-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt && python backend/setup.py"
    startCommand: "python backend/app.py"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 5000
